<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>

    <div id="container">
        <h1>Flashlight Effect</h1>
        <p>Move Your Mouse to reveal the content </p>

        <div id="gridContainer">
            <div class="card card1">
                <h2>Card 1</h2>
                <p>There is some Secret Content</p>
            </div>
            <div class="card card2">
                <h2>Card 2</h2>
                <p>Here is More Hidden Info</p>
            </div>
            <div class="card card3">
                <h2>Card 3</h2>
                <p>You Find Me!</p>
            </div>
            <div class="card card4">
                <h2>Card 4</h2>
                <p>Keep Looking...</p>
            </div>
            <div class="card card5">
                <h2>Card 5</h2>
                <p>Almost There...</p>
            </div>
            <div class="card card6">
                <h2>Card 6</h2>
                <p>The End</p>
            </div>
        </div>
    </div>
    <div id="Overlay">
        
    </div>
    <script src="script.js"> </script>
</body>
</html>
